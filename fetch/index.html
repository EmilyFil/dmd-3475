<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning about Fetch</title>
</head>
<body>
   <h1>Learning about Fetch</h1> 

   <ul id="catFactsList">

   </ul>


   <script>
    var simpleObject = {
        'name': 'Joel',
        'role': 'faculty',
    }
    console.log(simpleObject);

    var catFacts = [
        "Joel is not a fan of cats.",
        "Joel is allergic to cats.",
    ]
    function renderList(){
        const ulElement = document.getElementById("catFactsList");
        console.log(catFacts);
        catFacts.forEach(fact => {
            const li = document.createElement("li");
            li.textContent = fact;
            ulElement.appendChild(li);
        });
    }

    function getCatFacts(count){
        fetch("https://meowfacts.herokuapp.com/?count=" + count)
        .then(response => response.json())
        .then(function(data){
            catFacts = data.data;
            renderList();
        }
        );
    }

    getCatFacts(1);

    function getDogBreeds(){
        fetch("https://dogapi.dog/api/v2/breeds?page[size]=10")
        .then(response => response.json())
        .then(function(data){
            var dogBreeds = data.data;
            console.log(dogBreeds[0].attributes.name)
            console.log(dogBreeds[0].attributes.description);
        }
        );4
    }
   </script>
</body>
</html>
